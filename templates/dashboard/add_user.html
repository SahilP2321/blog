{% extends "base.html" %}
{% block content %}
{% load crispy_forms_tags %}

<div class="row">
    {% include 'dashboard/sidebar.html' %}

    <div class="col-md-9">
        {% if perms.auth.add_users %}
        <h2>Add New User</h2>

        <form method="POST" style="width:500px;">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-warning mb-4">Submit</button>
        </form>
        {% endif %}
    </div>
</div>

{% endblock %}
